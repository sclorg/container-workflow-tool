name: Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  tox_test:
    name: Tox test
    strategy:
      matrix:
        tox_env: [py311, py312, py313, py314]
    # Use GitHub's Linux Docker host
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Run Tox tests on container-ci-suite
      id: test
      uses: fedora-python/tox-github-action@main
      with:
        tox_env: ${{ matrix.tox_env }}
        dnf_install: gcc rpm-devel git python3-devel python3-pytest-cov python3-flexmock python3-GitPython python3-requests python3-pyyaml

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install -r tests/test-requirements.txt

      - name: Run unit tests with coverage
        run: |
          python3 -m pytest -m "not distgit" -v --showlocals \
            --cov=container_workflow_tool \
            --cov-report=xml:coverage.xml \
            tests/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit-tests
          files: coverage.xml
          fail_ci_if_error: false
